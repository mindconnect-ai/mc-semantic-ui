<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.20"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="#FFFFFF"/>

  <text x="600" y="55" text-anchor="middle" font-size="28" font-weight="700" fill="#1F2D5C">
    Partial updates with UiPatch
  </text>
  <text x="600" y="88" text-anchor="middle" font-size="16" fill="#5C6B82">
    Don't ship a whole page back. Ship only the diff.
  </text>

  <!-- LEFT side: "Whole page" comparison -->
  <g transform="translate(60, 145)">
    <text x="240" y="0" text-anchor="middle" font-size="16" font-weight="700" fill="#5C6B82">Without patches</text>
    <rect x="0" y="20" width="480" height="200" rx="14" fill="#FCE4EC" stroke="#E91E63" stroke-width="2" filter="url(#softShadow)"/>

    <!-- Cartoon: huge UiPage with arrow -->
    <rect x="40" y="55" width="240" height="140" rx="6" fill="#FFFFFF" stroke="#E91E63" stroke-width="2"/>
    <line x1="60"  y1="80" x2="260" y2="80" stroke="#E91E63" stroke-width="2"/>
    <line x1="60"  y1="100" x2="240" y2="100" stroke="#E91E63" stroke-width="2"/>
    <line x1="60"  y1="120" x2="260" y2="120" stroke="#E91E63" stroke-width="2"/>
    <line x1="60"  y1="140" x2="220" y2="140" stroke="#E91E63" stroke-width="2"/>
    <line x1="60"  y1="160" x2="250" y2="160" stroke="#E91E63" stroke-width="2"/>
    <line x1="60"  y1="180" x2="230" y2="180" stroke="#E91E63" stroke-width="2"/>

    <text x="370" y="100" text-anchor="middle" font-size="32">📦</text>
    <text x="370" y="135" text-anchor="middle" font-size="16" font-weight="700" fill="#AD1457">Whole</text>
    <text x="370" y="155" text-anchor="middle" font-size="16" font-weight="700" fill="#AD1457">UiPage</text>
    <text x="370" y="180" text-anchor="middle" font-size="12" fill="#AD1457">resent</text>
  </g>

  <!-- VS divider -->
  <g transform="translate(575, 245)">
    <circle cx="25" cy="25" r="28" fill="#1F2D5C"/>
    <text x="25" y="33" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">VS</text>
  </g>

  <!-- RIGHT side: "Just the patch" -->
  <g transform="translate(660, 145)">
    <text x="240" y="0" text-anchor="middle" font-size="16" font-weight="700" fill="#5C6B82">With UiPatch</text>
    <rect x="0" y="20" width="480" height="200" rx="14" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" filter="url(#softShadow)"/>

    <!-- Cartoon: tiny patch box -->
    <rect x="160" y="80" width="160" height="100" rx="6" fill="#FFFFFF" stroke="#4CAF50" stroke-width="2"/>
    <text x="240" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D32">APPEND</text>
    <text x="240" y="130" text-anchor="middle" font-size="11" fill="#2E7D32">targetId: "messages"</text>
    <text x="240" y="150" text-anchor="middle" font-size="11" fill="#2E7D32">node: { ... }</text>
    <text x="240" y="172" text-anchor="middle" font-size="24">✨</text>
  </g>

  <!-- Op kinds row -->
  <g transform="translate(60, 410)">
    <text x="600" y="0" text-anchor="middle" font-size="16" font-weight="700" fill="#1F2D5C">Four operation kinds, each addresses a node by id:</text>

    <g transform="translate(180, 30)">
      <rect width="170" height="60" rx="10" fill="#E8F4FD" stroke="#3A7BD5" stroke-width="2"/>
      <text x="85" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1F4E8C">REPLACE</text>
      <text x="85" y="50" text-anchor="middle" font-size="12" fill="#5C6B82">swap a subtree</text>
    </g>
    <g transform="translate(370, 30)">
      <rect width="170" height="60" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
      <text x="85" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#2E7D32">APPEND</text>
      <text x="85" y="50" text-anchor="middle" font-size="12" fill="#5C6B82">add a child</text>
    </g>
    <g transform="translate(560, 30)">
      <rect width="170" height="60" rx="10" fill="#FFF4E6" stroke="#FF9800" stroke-width="2"/>
      <text x="85" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#B25C00">CLEAR</text>
      <text x="85" y="50" text-anchor="middle" font-size="12" fill="#5C6B82">empty children</text>
    </g>
    <g transform="translate(750, 30)">
      <rect width="170" height="60" rx="10" fill="#FCE4EC" stroke="#E91E63" stroke-width="2"/>
      <text x="85" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#AD1457">REMOVE</text>
      <text x="85" y="50" text-anchor="middle" font-size="12" fill="#5C6B82">drop a subtree</text>
    </g>
  </g>

  <!-- Bottom note -->
  <g transform="translate(0, 520)">
    <rect x="60" y="0" width="1080" height="60" rx="10" fill="#FFFBEA" stroke="#B89500" stroke-width="2"/>
    <text x="600" y="36" text-anchor="middle" font-size="14" fill="#7A5C00">Used for chat streams, "load more", filter updates, live job progress — bandwidth and state stay sane.</text>
  </g>
</svg>
