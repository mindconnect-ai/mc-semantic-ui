<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.20"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#3A7BD5"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#1F2D5C">
    Streaming chat — UiPatch in action
  </text>
  <text x="600" y="80" text-anchor="middle" font-size="15" fill="#5C6B82">
    Each server frame is one APPEND. The renderer adds a bubble. The tree just keeps growing.
  </text>

  <!-- LEFT: Browser chat -->
  <g transform="translate(60, 120)">
    <!-- Browser chrome -->
    <rect x="0" y="0" width="480" height="540" rx="14" fill="#FFFFFF" stroke="#1F2D5C" stroke-width="2" filter="url(#softShadow)"/>
    <rect x="0" y="0" width="480" height="42" rx="14" fill="#1F2D5C"/>
    <circle cx="22" cy="21" r="6" fill="#FF6B6B"/>
    <circle cx="42" cy="21" r="6" fill="#FFD93D"/>
    <circle cx="62" cy="21" r="6" fill="#6BCB77"/>
    <text x="240" y="26" text-anchor="middle" font-size="13" fill="#FFFFFF" font-family="monospace">#messages</text>

    <!-- Message bubble 1: user -->
    <g transform="translate(0, 70)">
      <rect x="170" y="0" width="290" height="56" rx="14" fill="#3A7BD5"/>
      <text x="315" y="25" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="700">You</text>
      <text x="315" y="45" text-anchor="middle" font-size="13" fill="#FFFFFF">How do I deploy?</text>
    </g>

    <!-- Message bubble 2: assistant (partial -> grown via REPLACE) -->
    <g transform="translate(0, 150)">
      <rect x="20" y="0" width="290" height="86" rx="14" fill="#E8F4FD" stroke="#3A7BD5" stroke-width="1.5"/>
      <text x="40" y="22" font-size="14" fill="#1F2D5C" font-weight="700">Assistant</text>
      <text x="40" y="44" font-size="13" fill="#1F2D5C">Run mvn deploy. The plugin</text>
      <text x="40" y="62" font-size="13" fill="#1F2D5C">uploads the artifact to your</text>
      <text x="40" y="80" font-size="13" fill="#1F2D5C">configured repository…</text>
    </g>

    <!-- Message bubble 3: user follow-up -->
    <g transform="translate(0, 260)">
      <rect x="170" y="0" width="290" height="56" rx="14" fill="#3A7BD5"/>
      <text x="315" y="25" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="700">You</text>
      <text x="315" y="45" text-anchor="middle" font-size="13" fill="#FFFFFF">And rollback?</text>
    </g>

    <!-- Message bubble 4: assistant typing -->
    <g transform="translate(0, 340)">
      <rect x="20" y="0" width="290" height="50" rx="14" fill="#E8F4FD" stroke="#3A7BD5" stroke-width="1.5" stroke-dasharray="4 3"/>
      <text x="40" y="22" font-size="14" fill="#1F2D5C" font-weight="700">Assistant</text>
      <circle cx="50"  cy="38" r="3" fill="#1F2D5C" opacity="0.5"/>
      <circle cx="62"  cy="38" r="3" fill="#1F2D5C" opacity="0.7"/>
      <circle cx="74"  cy="38" r="3" fill="#1F2D5C"/>
    </g>

    <!-- Input box -->
    <g transform="translate(0, 430)">
      <rect x="20" y="0" width="440" height="44" rx="22" fill="#F4F6FA" stroke="#5C6B82" stroke-width="1"/>
      <text x="40" y="28" font-size="13" fill="#9AA5B6">Type a message…</text>
    </g>

    <!-- Browser footer label -->
    <text x="240" y="525" text-anchor="middle" font-size="12" fill="#5C6B82" font-style="italic">
      The DOM. Scroll, focus, input stay untouched.
    </text>
  </g>

  <!-- ARROWS between browser and stream -->
  <g stroke="#3A7BD5" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)">
    <!-- Frame 1 → user bubble -->
    <path d="M 690 200 L 555 200" />
    <!-- Frame 2 → assistant bubble -->
    <path d="M 690 295 L 555 295" />
    <!-- Frame 3 → assistant typing -->
    <path d="M 690 480 L 555 480" />
  </g>

  <!-- RIGHT: Stream of patches -->
  <g transform="translate(700, 130)">
    <text x="220" y="0" text-anchor="middle" font-size="15" font-weight="700" fill="#5C6B82">SSE stream — one UiPatch per frame</text>

    <!-- Frame 1: APPEND user -->
    <g transform="translate(0, 30)">
      <rect width="440" height="120" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" filter="url(#softShadow)"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#2E7D32" font-family="monospace">event: patch</text>
      <text x="14" y="42" font-size="11" font-weight="700" fill="#2E7D32" font-family="monospace">data:</text>
      <text x="14" y="62" font-size="11" fill="#2E7D32" font-family="monospace">  op:     APPEND</text>
      <text x="14" y="80" font-size="11" fill="#2E7D32" font-family="monospace">  target: "messages"</text>
      <text x="14" y="98" font-size="11" fill="#2E7D32" font-family="monospace">  node:   { type: "text",</text>
      <text x="14" y="114" font-size="11" fill="#2E7D32" font-family="monospace">            text: "How do I deploy?" }</text>
    </g>

    <!-- Frame 2: APPEND assistant -->
    <g transform="translate(0, 175)">
      <rect width="440" height="120" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" filter="url(#softShadow)"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#2E7D32" font-family="monospace">event: patch</text>
      <text x="14" y="42" font-size="11" font-weight="700" fill="#2E7D32" font-family="monospace">data:</text>
      <text x="14" y="62" font-size="11" fill="#2E7D32" font-family="monospace">  op:     APPEND</text>
      <text x="14" y="80" font-size="11" fill="#2E7D32" font-family="monospace">  target: "messages"</text>
      <text x="14" y="98" font-size="11" fill="#2E7D32" font-family="monospace">  node:   { type: "text",</text>
      <text x="14" y="114" font-size="11" fill="#2E7D32" font-family="monospace">            text: "Run mvn deploy…" }</text>
    </g>

    <!-- Frame N: tokens still streaming -->
    <g transform="translate(0, 320)">
      <rect width="440" height="120" rx="10" fill="#FFF4E6" stroke="#FF9800" stroke-width="2" filter="url(#softShadow)"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#B25C00" font-family="monospace">event: patch</text>
      <text x="14" y="42" font-size="11" font-weight="700" fill="#B25C00" font-family="monospace">data:</text>
      <text x="14" y="62" font-size="11" fill="#B25C00" font-family="monospace">  op:     REPLACE</text>
      <text x="14" y="80" font-size="11" fill="#B25C00" font-family="monospace">  target: "m-43-assistant"</text>
      <text x="14" y="98" font-size="11" fill="#B25C00" font-family="monospace">  node:   { type: "text",</text>
      <text x="14" y="114" font-size="11" fill="#B25C00" font-family="monospace">            text: "Run mvn deploy. T…" }</text>
    </g>

    <!-- "…" between frames -->
    <text x="220" y="465" text-anchor="middle" font-size="22" fill="#5C6B82">⋮</text>
    <text x="220" y="488" text-anchor="middle" font-size="13" fill="#5C6B82" font-style="italic">tokens keep streaming…</text>
  </g>
</svg>
