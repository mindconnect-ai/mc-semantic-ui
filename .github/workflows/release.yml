name: release

# Manual, deliberate releases only — never on every merge. You pick the moment;
# this cuts the -SNAPSHOT to a real version, publishes the modules to GitHub
# Packages AND to Maven Central, tags it, then opens the next -SNAPSHOT on main.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   MAVEN_GPG_PRIVATE_KEY   armored private key: gpg --armor --export-secret-keys <KEY_ID>
#   MAVEN_GPG_PASSPHRASE    that key's passphrase
#   CENTRAL_TOKEN_USERNAME  Central Portal user token — username half
#   CENTRAL_TOKEN_PASSWORD  Central Portal user token — password half
# See RELEASING.md. Without them the Central step fails; GitHub Packages still works.
on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Release version (blank = drop -SNAPSHOT from the current one)'
        required: false
        default: ''
      nextVersion:
        description: 'Next dev version incl. -SNAPSHOT (blank = bump patch)'
        required: false
        default: ''

permissions:
  contents: write   # push the version-bump commits and the tag
  packages: write   # publish to GitHub Packages

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          # Imports the signing key into the runner's keyring (and sets up the
          # gpg-agent for non-interactive use). Maven Central rejects unsigned
          # artifacts, so this is what makes the release publishable.
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      # This release publishes to TWO places, so settings.xml needs two servers
      # — one more than setup-java's server-id can wire. Passwords stay out of
      # the file: ${env.*} is resolved by Maven at deploy time from the step's
      # env, so nothing secret is ever written to disk.
      - name: Write Maven settings for both publish targets
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'XML'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0">
            <servers>
              <!-- id matches <distributionManagement> in mc-semantic-ui-parent -->
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GH_PACKAGES_TOKEN}</password>
              </server>
              <!-- id matches <publishingServerId> in the parent's release profile -->
              <server>
                <id>central</id>
                <username>${env.CENTRAL_USERNAME}</username>
                <password>${env.CENTRAL_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          XML

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute versions
        id: v
        run: |
          set -euo pipefail
          CURRENT=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          RELEASE="${{ inputs.releaseVersion }}"
          [ -z "$RELEASE" ] && RELEASE="${CURRENT%-SNAPSHOT}"
          NEXT="${{ inputs.nextVersion }}"
          if [ -z "$NEXT" ]; then
            IFS='.' read -r MA MI PA <<< "$RELEASE"
            NEXT="${MA}.${MI}.$((PA + 1))-SNAPSHOT"
          fi
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT"       >> "$GITHUB_OUTPUT"
          echo "Releasing $CURRENT -> $RELEASE, then opening $NEXT"

      # Flat version scheme — every module shares the exact same version string,
      # in both <version> and <parent>. Replace the literal string across every
      # pom (the aggregator's parent isn't in the reactor versions:set would
      # touch, so a plain sed is complete and can't leave a mixed state).
      - name: Set release version
        run: find . -name pom.xml -exec sed -i "s|<version>${{ steps.v.outputs.current }}</version>|<version>${{ steps.v.outputs.release }}</version>|g" {} +

      # Keep the copy-paste dependency snippets in the docs on the version people
      # can actually pull. Targets only a <version> that follows an mc-* artifactId,
      # so third-party versions (spring-boot, …) are untouched. Docusaurus can't
      # interpolate variables inside code fences, so this source rewrite is the way.
      - name: Update dependency snippets in the docs
        env:
          RELEASE: ${{ steps.v.outputs.release }}
        run: >
          find website/docs \( -name '*.md' -o -name '*.mdx' \) -print0
          | xargs -0 perl -0777 -pi -e
          's|(<artifactId>mc-[^<]+</artifactId>\s*<version>)[^<]+(</version>)|${1}$ENV{RELEASE}${2}|g'

      # Publish target comes from <distributionManagement> in mc-semantic-ui-parent
      # (server id "github"). No -D needed. Tests are skipped here — CI already
      # ran them on the commit being released.
      - name: Build & publish to GitHub Packages
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B -ntp -DskipTests deploy

      # Then the same artifacts to Maven Central. The `release` profile adds the
      # -sources/-javadoc jars and the GPG signatures Central requires, and sets
      # maven.deploy.skip=true — so this run uploads ONLY to Central and does not
      # deploy to GitHub Packages a second time.
      #
      # autoPublish is false, so the bundle lands in the portal as a validated
      # draft: it does not go live until you press Publish at
      # https://central.sonatype.com/publishing/deployments
      # A Central release can never be deleted, hence the deliberate manual gate.
      - name: Publish to Maven Central
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: mvn -B -ntp -DskipTests deploy -Prelease

      - name: Commit release version and tag
        run: |
          git commit -am "release: v${{ steps.v.outputs.release }}"
          git tag -a "v${{ steps.v.outputs.release }}" -m "Release v${{ steps.v.outputs.release }}"

      - name: Open next development version
        run: find . -name pom.xml -exec sed -i "s|<version>${{ steps.v.outputs.release }}</version>|<version>${{ steps.v.outputs.next }}</version>|g" {} +

      - name: Commit next version and push
        run: |
          git commit -am "chore: start ${{ steps.v.outputs.next }} [skip ci]"
          git push origin HEAD:${{ github.ref_name }} --follow-tags

      # Turn the pushed tag into a proper Release entry with auto-generated notes.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "v${{ steps.v.outputs.release }}"
          --title "v${{ steps.v.outputs.release }}"
          --generate-notes
