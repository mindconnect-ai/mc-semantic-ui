name: pages

# Publishes the Docusaurus site to GitHub Pages:
#   https://mindconnect-ai.github.io/mc-semantic-ui/
#
# Runs on every push to main that touches the site, and on demand. The release
# workflow rewrites the version in the docs' dependency snippets and pushes that
# commit, so a release republishes the site on its own.
#
# ┌ One-time setup, or the deploy step fails with "Pages site not found" ──────┐
# │  Settings -> Pages -> Build and deployment -> Source: GitHub Actions       │
# │  The repository must be public (GitHub Free serves Pages only from public  │
# │  repos; private ones need Pro/Team/Enterprise).                            │
# └───────────────────────────────────────────────────────────────────────────┘
on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write        # publish the artifact
  id-token: write     # deploy-pages authenticates via OIDC, not a token

# One deployment at a time. Deliberately NOT cancel-in-progress: aborting a
# half-finished deploy would leave the live site in an undefined state, and the
# next push republishes anyway.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # The site serves real build output, not just markdown: the embedded live
      # demo (static/embed/*.html) imports /sui/renderer.js and
      # /sui/eventbus.js, and the /editor and /widget-demo links are whole
      # backend-free apps. website's prebuild hook stages all of that out of
      # target/, and silently skips ("not built yet") whatever is missing — so
      # without this step the build stays green and the deployed pages 404.
      #
      # Only the modules that produce browser assets; -am pulls in what they
      # depend on (the parent, core, mc-sui-editor).
      - name: Build the browser assets the site serves
        run: >
          mvn -B -ntp -DskipTests install
          -pl core/mc-semantic-ui-core,ext/mc-semantic-ui-ext-diagram,ext/mc-semantic-ui-ext-chart,demo/mc-sui-widget-demo,editor/mc-sui-editor-standalone-app
          -am

      # ci, not install: reproducible, and it fails loudly if package-lock.json
      # and package.json ever drift apart.
      - name: Install dependencies
        working-directory: website
        run: npm ci

      # baseUrl is '/mc-semantic-ui/' in docusaurus.config.js, which is what
      # makes asset paths resolve under the project-page URL. Nothing to pass in
      # here; the config already matches where Pages serves from.
      - name: Build site
        working-directory: website
        run: npm run build

      # The copy hook fails soft by design (a missing bundle should not stop a
      # docs-only build locally). That is exactly how a deploy once went out
      # with a live demo 404ing on its own scripts — so here, where it does get
      # published, assert the files are really in the artifact.
      - name: Verify the staged apps and runtime are in the build
        working-directory: website
        run: |
          missing=0
          for f in build/sui/renderer.js \
                   build/sui/eventbus.js \
                   build/sui/icons.svg \
                   build/editor/index.html \
                   build/widget-demo/index.html; do
            if [ ! -f "$f" ]; then echo "MISSING: $f"; missing=1; fi
          done
          if [ "$missing" = "1" ]; then
            echo "Those pages would 404. Did the Maven step build every module?"
            exit 1
          fi
          echo "Embedded runtime, editor and widget demo all present."

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: website/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
